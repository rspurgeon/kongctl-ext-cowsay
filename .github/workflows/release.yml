name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0). Created if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build release archive
        run: |
          mkdir -p dist/package/bin
          cp kongctl-extension.yaml README.md dist/package/
          cp bin/kongctl-ext-cowsay dist/package/bin/
          chmod +x dist/package/bin/kongctl-ext-cowsay
          tar -C dist/package -czf \
            dist/kongctl-ext-cowsay-universal.tar.gz \
            kongctl-extension.yaml README.md bin/kongctl-ext-cowsay

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          tag_name: ${{ inputs.tag || github.ref_name }}
